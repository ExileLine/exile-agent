name: ops-observer
title: Runtime Ops Observer
description: 面向运行时状态、配置检查与资源排查的诊断型技能包。
tags:
  - ops
  - runtime
  - debug
  - health
enabled: true
priority: 100
load_strategy: full_on_match
allowed_agents:
  - chat-agent
required_toolsets: []
required_mcp_servers: []
instruction_files:
  - SKILL.md
route_keywords:
  - 健康
  - 状态
  - 资源
  - 配置
  - 运行时
summary: 优先使用当前已开放的只读工具检查运行时状态、配置摘要与资源可用性，不要主观猜测服务状态。
